name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      
    - name: Install Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Build APK
      run: |
        cd open_bird
        flutter pub get
        flutter build apk --debug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug.apk
        path: open_bird/build/app/outputs/flutter-apk/app-debug.apk
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: open_bird/build/app/outputs/flutter-apk/app-debug.apk
        tag_name: v1.0.0-built
        name: OpenBird v1.0.0 (APK)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}